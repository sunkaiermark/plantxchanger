# Render Blueprint for the PlantXchange CMS and PostgreSQL database.
# Frontend deployment remains on Vercel with Root Directory set to apps/web.

services:
  - type: web
    runtime: node
    name: plantxchange-cms
    plan: starter
    branch: main
    region: singapore
    buildCommand: npm ci && npm --workspace apps/cms run build
    startCommand: npm --workspace apps/cms run start
    domains:
      - cms.plantxchanger.com
    disk:
      name: plantxchange-cms-uploads
      mountPath: /opt/render/project/src/apps/cms/public/uploads
      sizeGB: 10
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: PUBLIC_URL
        value: https://cms.plantxchanger.com
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: plantxchange-postgres
          property: connectionString
      - key: DATABASE_SSL
        value: false
      - key: DATABASE_POOL_MIN
        value: 2
      - key: DATABASE_POOL_MAX
        value: 10
      - key: PLANTXCHANGE_SEED
        value: false
      - key: APP_KEYS
        sync: false
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: plantxchange-postgres
    databaseName: plantxchange
    user: plantxchange
    plan: basic-256mb
    region: singapore
    diskSizeGB: 15
